<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OCR Läshjälp</title>
<meta name="description" content="Tolkar text från bilder och PDF:er och läser upp högt. Hjälp för elever med lässvårigheter.">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#fdf6e3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OCR Läshjälp">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.js"></script>
<style>
:root {
  --bg: #fdf6e3;
  --surface: #fffbf0;
  --ink: #1a1a1a;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --border: #d4cfc0;
  --muted: #6b6b6b;
  --success: #16a34a;
  --danger: #dc2626;
  --font-size: 20px;
  --line-height: 1.8;
  --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
[data-theme="dark"] { --bg:#1a1a1a; --surface:#262626; --ink:#f5f5f5; --border:#404040; --muted:#a0a0a0; }
[data-theme="highcontrast"] { --bg:#000; --surface:#0a0a0a; --ink:#fff; --accent:#ffff00; --accent-hover:#dddd00; --border:#fff; --muted:#ccc; }
* { box-sizing: border-box; }
body { font-family: var(--font-family); font-size: 16px; background: var(--bg); color: var(--ink); margin: 0; padding: 20px; min-height: 100vh; }
.container { max-width: 960px; margin: 0 auto; }
h1 { font-size: 26px; margin: 0 0 4px; }
.subtitle { color: var(--muted); margin: 0 0 20px; font-size: 14px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.input-row { display: flex; gap: 10px; margin-bottom: 12px; }
.input-row button { flex: 1; padding: 14px 8px; font-size: 15px; }
input[type="file"] { display: none; }
button { background: var(--accent); color: white; border: none; padding: 10px 16px; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; font-family: inherit; }
button:hover:not(:disabled) { background: var(--accent-hover); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
button.secondary { background: transparent; color: var(--ink); border: 1px solid var(--border); }
button.secondary:hover:not(:disabled) { background: rgba(0,0,0,0.05); }
button.small { padding: 6px 12px; font-size: 13px; }
.progress { background: var(--border); border-radius: 8px; height: 8px; overflow: hidden; margin: 12px 0; }
.progress-bar { background: var(--accent); height: 100%; transition: width 0.3s; width: 0%; }
.reader { font-size: var(--font-size); line-height: var(--line-height); font-family: var(--font-family); padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; min-height: 80px; user-select: text; max-height: 50vh; overflow-y: auto; white-space: normal; }
.reader .sentence { transition: background 0.15s; border-radius: 4px; padding: 1px 0; }
.reader .sentence.active { background: #ffd70066; }
.bionic .sentence { font-weight: 300; }
.bionic .sentence b { font-weight: 700; }
#textOutput { font-size: var(--font-size); line-height: var(--line-height); font-family: var(--font-family); width: 100%; min-height: 200px; padding: 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--ink); resize: vertical; }
.controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 12px; }
.settings { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-top: 12px; }
.setting { display: flex; flex-direction: column; gap: 4px; }
.setting label { font-size: 13px; color: var(--muted); }
.setting select, .setting input[type="range"] { padding: 6px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--ink); font-family: inherit; font-size: 13px; }
.setting label:has(input[type="checkbox"]) { color: var(--ink); font-size: 15px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
.status { padding: 8px 12px; border-radius: 6px; font-size: 14px; margin: 8px 0; }
.status.info { background: rgba(37,99,235,0.1); color: var(--accent); }
.status.error { background: rgba(220,38,38,0.1); color: var(--danger); }
.status.success { background: rgba(22,163,74,0.1); color: var(--success); }
.hidden { display: none !important; }
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/gh/antijingoist/open-dyslexic@master/compiled/OpenDyslexic-Regular.woff2') format('woff2');
  font-weight: normal; font-display: swap;
}
.dyslexic-font { --font-family: 'OpenDyslexic', sans-serif; }
kbd { background: var(--border); padding: 2px 6px; border-radius: 4px; font-size: 11px; font-family: monospace; }
.hint { color: var(--muted); font-size: 12px; margin-top: 6px; }
.page-nav { display: flex; gap: 8px; align-items: center; margin-top: 10px; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <h1>OCR Läshjälp</h1>
  <p class="subtitle">Fotografera, ladda upp en bild eller PDF — texten tolkas och läses upp högt.</p>

  <div class="card">
    <div class="input-row">
      <button id="cameraBtn">Ta foto</button>
      <button id="fileBtn" class="secondary">Välj fil</button>
    </div>
    <input type="file" id="fileInput" accept="image/*,application/pdf">
    <input type="file" id="cameraInput" accept="image/*" capture="environment">
    <canvas id="previewCanvas" class="hidden"></canvas>
    <img id="preview" class="hidden" alt="">

    <div class="settings">
      <div class="setting">
        <label for="langSelect">Språk</label>
        <select id="langSelect">
          <option value="swe">Svenska</option>
          <option value="eng">Engelska</option>
          <option value="swe+eng">Svenska + Engelska</option>
          <option value="nor">Norska</option>
          <option value="dan">Danska</option>
          <option value="deu">Tyska</option>
        </select>
      </div>
      <div class="setting">
        <label><input type="checkbox" id="preprocessToggle" checked> Förbehandla bild</label>
      </div>
    </div>

    <div class="controls">
      <button id="ocrBtn" disabled>Tolka text</button>
      <button id="clearBtn" class="secondary" disabled>Rensa</button>
    </div>
    <div class="progress hidden" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="status"></div>
    <div class="page-nav hidden" id="pageNav">
      <button id="prevPageBtn" class="secondary small" disabled>&lt; Förra</button>
      <span id="pageInfo"></span>
      <button id="nextPageBtn" class="secondary small" disabled>Nästa &gt;</button>
    </div>
  </div>

  <div class="card hidden" id="resultCard">
    <div id="readerView">
      <div class="reader" id="reader"></div>
    </div>
    <div id="editView" class="hidden">
      <textarea id="textOutput"></textarea>
    </div>
    <div class="controls">
      <button id="playBtn">&#9654; Spela</button>
      <button id="pauseBtn" class="secondary" disabled>&#9646;&#9646; Paus</button>
      <button id="stopBtn" class="secondary" disabled>&#9632; Stopp</button>
      <span style="flex:1"></span>
      <button id="editToggleBtn" class="secondary">Redigera</button>
      <button id="copyBtn" class="secondary">Kopiera</button>
    </div>
    <div class="settings">
      <div class="setting">
        <label for="voiceSelect">Röst</label>
        <select id="voiceSelect"></select>
      </div>
      <div class="setting">
        <label for="rateSlider">Hastighet: <span id="rateValue">1.0</span>x</label>
        <input type="range" id="rateSlider" min="0.5" max="1.8" step="0.1" value="1.0">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="settings">
      <div class="setting">
        <label for="fontSizeSlider">Textstorlek: <span id="fontSizeValue">20</span>px</label>
        <input type="range" id="fontSizeSlider" min="14" max="40" step="1" value="20">
      </div>
      <div class="setting">
        <label for="lineHeightSlider">Radavstånd: <span id="lineHeightValue">1.8</span></label>
        <input type="range" id="lineHeightSlider" min="1.2" max="2.5" step="0.1" value="1.8">
      </div>
      <div class="setting">
        <label for="themeSelect">Tema</label>
        <select id="themeSelect">
          <option value="light">Ljust</option>
          <option value="dark">Mörkt</option>
          <option value="highcontrast">Hög kontrast</option>
        </select>
      </div>
      <div class="setting">
        <label><input type="checkbox" id="dyslexicFontToggle"> OpenDyslexic</label>
      </div>
      <div class="setting">
        <label><input type="checkbox" id="bionicToggle"> Bionic Reading</label>
      </div>
      <div class="setting">
        <label><input type="checkbox" id="highlightToggle" checked> Markera text vid uppläsning</label>
      </div>
    </div>
    <p class="hint"><kbd>Mellanslag</kbd> spela/paus &nbsp; <kbd>Esc</kbd> stopp</p>
  </div>

  <button id="installBtn" class="secondary hidden" style="width:100%;">Installera app</button>
</div>

<script>
const $ = id => document.getElementById(id);

// --- Elements ---
const fileInput = $('fileInput'), cameraInput = $('cameraInput');
const cameraBtn = $('cameraBtn'), fileBtn = $('fileBtn');
const preview = $('preview'), previewCanvas = $('previewCanvas');
const ocrBtn = $('ocrBtn'), clearBtn = $('clearBtn');
const langSelect = $('langSelect'), preprocessToggle = $('preprocessToggle');
const progressWrap = $('progressWrap'), progressBar = $('progressBar'), statusEl = $('status');
const resultCard = $('resultCard'), textOutput = $('textOutput');
const readerView = $('readerView'), editView = $('editView');
const editToggleBtn = $('editToggleBtn'), copyBtn = $('copyBtn');
const readerEl = $('reader');
const playBtn = $('playBtn'), pauseBtn = $('pauseBtn'), stopBtn = $('stopBtn');
const voiceSelect = $('voiceSelect');
const rateSlider = $('rateSlider'), rateValueEl = $('rateValue');
const fontSizeSlider = $('fontSizeSlider'), fontSizeValue = $('fontSizeValue');
const lineHeightSlider = $('lineHeightSlider'), lineHeightValue = $('lineHeightValue');
const themeSelect = $('themeSelect'), dyslexicFontToggle = $('dyslexicFontToggle');
const bionicToggle = $('bionicToggle'), highlightToggle = $('highlightToggle');
const pageNav = $('pageNav'), pageInfo = $('pageInfo');
const prevPageBtn = $('prevPageBtn'), nextPageBtn = $('nextPageBtn');

let sentenceSpans = []; // each: { el: span, text: string }
let ttsState = { speaking: false, paused: false, stopRequested: false, sentenceIndex: 0 };
let isEditing = false;

// PDF state
let pdfDoc = null;
let pdfCurrentPage = 1;
let pdfTotalPages = 0;

function setStatus(msg, type = 'info') {
  statusEl.innerHTML = msg ? `<div class="status ${type}">${msg}</div>` : '';
}

function normalizeText(text) {
  return text
    .replace(/-\s*\n\s*/g, '')
    .replace(/\n{2,}/g, '\n\n')
    .replace(/([^\n])\n([^\n])/g, '$1 $2')
    .replace(/ {2,}/g, ' ');
}

// --- Input ---
cameraBtn.addEventListener('click', () => cameraInput.click());
fileBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
cameraInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (file.type === 'application/pdf') {
    handlePDF(file);
    return;
  }
  if (!file.type.startsWith('image/')) {
    setStatus('Filen måste vara en bild eller PDF.', 'error');
    return;
  }
  pdfDoc = null;
  pageNav.classList.add('hidden');
  const fr = new FileReader();
  fr.onload = e => {
    preview.src = e.target.result;
    preview.onload = () => {
      renderPreprocessed();
      ocrBtn.disabled = false;
      clearBtn.disabled = false;
      setStatus('Bild laddad.', 'success');
    };
  };
  fr.readAsDataURL(file);
}

async function handlePDF(file) {
  setStatus('Laddar PDF...', 'info');
  try {
    const arrayBuffer = await file.arrayBuffer();
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.js';
    pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    pdfTotalPages = pdfDoc.numPages;
    pdfCurrentPage = 1;
    pageNav.classList.remove('hidden');
    updatePageNav();
    await renderPDFPage(pdfCurrentPage);
    ocrBtn.disabled = false;
    clearBtn.disabled = false;
    setStatus(`PDF laddad: ${pdfTotalPages} sidor.`, 'success');
  } catch (err) {
    setStatus(`Kunde inte ladda PDF: ${err.message}`, 'error');
    console.error('[PDF]', err);
  }
}

async function renderPDFPage(pageNum) {
  const page = await pdfDoc.getPage(pageNum);
  const scale = 2.0;
  const viewport = page.getViewport({ scale });
  previewCanvas.width = viewport.width;
  previewCanvas.height = viewport.height;
  const ctx = previewCanvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;

  // Also try to extract text directly from PDF
  const textContent = await page.getTextContent();
  const pdfText = textContent.items.map(i => i.str).join(' ').trim();
  if (pdfText.length > 50) {
    // PDF has embedded text — use it directly, skip OCR
    textOutput.value = pdfText;
    loadIntoReader();
    resultCard.classList.remove('hidden');
    setStatus('Text extraherad direkt från PDF.', 'success');
    resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }

  // No embedded text — need OCR, apply preprocessing
  if (preprocessToggle.checked) applyPreprocessing();
}

function updatePageNav() {
  pageInfo.textContent = `Sida ${pdfCurrentPage} av ${pdfTotalPages}`;
  prevPageBtn.disabled = pdfCurrentPage <= 1;
  nextPageBtn.disabled = pdfCurrentPage >= pdfTotalPages;
}

prevPageBtn.addEventListener('click', async () => {
  if (pdfCurrentPage > 1) {
    pdfCurrentPage--;
    updatePageNav();
    await renderPDFPage(pdfCurrentPage);
  }
});

nextPageBtn.addEventListener('click', async () => {
  if (pdfCurrentPage < pdfTotalPages) {
    pdfCurrentPage++;
    updatePageNav();
    await renderPDFPage(pdfCurrentPage);
  }
});

preprocessToggle.addEventListener('change', () => {
  if (pdfDoc) return; // PDF handles its own canvas
  renderPreprocessed();
});

function renderPreprocessed() {
  if (!preview.src || !preview.complete || !preview.naturalWidth) return;
  const w = preview.naturalWidth, h = preview.naturalHeight;
  const targetWidth = Math.max(w, 1500);
  const scale = targetWidth / w;
  const sw = Math.round(w * scale);
  const sh = Math.round(h * scale);
  previewCanvas.width = sw;
  previewCanvas.height = sh;
  const ctx = previewCanvas.getContext('2d');
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(preview, 0, 0, sw, sh);
  if (preprocessToggle.checked) applyPreprocessing();
}

function applyPreprocessing() {
  const ctx = previewCanvas.getContext('2d');
  const sw = previewCanvas.width, sh = previewCanvas.height;
  const imgData = ctx.getImageData(0, 0, sw, sh);
  const d = imgData.data;
  let min = 255, max = 0;
  for (let i = 0; i < d.length; i += 4) {
    const g = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
    d[i] = d[i+1] = d[i+2] = g;
    if (g < min) min = g;
    if (g > max) max = g;
  }
  const range = Math.max(max - min, 1);
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.round(((d[i] - min) / range) * 255);
    d[i] = d[i+1] = d[i+2] = v;
  }
  ctx.putImageData(imgData, 0, 0);
}

clearBtn.addEventListener('click', () => {
  pdfDoc = null;
  preview.src = '';
  ocrBtn.disabled = true;
  clearBtn.disabled = true;
  fileInput.value = '';
  cameraInput.value = '';
  resultCard.classList.add('hidden');
  pageNav.classList.add('hidden');
  stopPlayback();
  setStatus('');
});

// --- OCR ---
ocrBtn.addEventListener('click', async () => {
  if (previewCanvas.width === 0) return;
  ocrBtn.disabled = true;
  clearBtn.disabled = true;
  progressWrap.classList.remove('hidden');
  progressBar.style.width = '0%';
  setStatus('Startar OCR-motor...', 'info');

  const langs = langSelect.value.split('+');
  let worker;
  try {
    worker = await Tesseract.createWorker(langs, 1, {
      workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/worker.min.js',
      corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@5.1.1',
      langPath: 'https://tessdata.projectnaptha.com/4.0.0',
      logger: m => {
        if (m.status === 'recognizing text') {
          progressBar.style.width = (m.progress * 100) + '%';
          setStatus(`Tolkar text... ${Math.round(m.progress * 100)}%`, 'info');
        } else if (m.status && m.progress !== undefined) {
          setStatus(`${m.status}... ${Math.round(m.progress * 100)}%`, 'info');
        }
      },
      errorHandler: err => console.error('[OCR]', err)
    });
    await worker.setParameters({ tessedit_pageseg_mode: '6', preserve_interword_spaces: '1' });
    const { data } = await worker.recognize(previewCanvas);
    const cleanText = data.text.trim();
    if (!cleanText) {
      setStatus('Ingen text hittades. Kontrollera bilden eller prova att slå av förbehandling.', 'error');
    } else {
      textOutput.value = cleanText;
      loadIntoReader();
      resultCard.classList.remove('hidden');
      setStatus('', 'success');
      resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  } catch (err) {
    setStatus(`Fel: ${err.message || err}`, 'error');
  } finally {
    if (worker) { try { await worker.terminate(); } catch (e) {} }
    progressWrap.classList.add('hidden');
    ocrBtn.disabled = false;
    clearBtn.disabled = false;
  }
});

// --- Edit toggle ---
editToggleBtn.addEventListener('click', () => {
  isEditing = !isEditing;
  if (isEditing) {
    readerView.classList.add('hidden');
    editView.classList.remove('hidden');
    editToggleBtn.textContent = 'Klar';
  } else {
    loadIntoReader();
    editView.classList.add('hidden');
    readerView.classList.remove('hidden');
    editToggleBtn.textContent = 'Redigera';
  }
});

copyBtn.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(textOutput.value);
    const orig = copyBtn.textContent;
    copyBtn.textContent = 'Kopierat!';
    setTimeout(() => copyBtn.textContent = orig, 1500);
  } catch (err) { setStatus('Kunde inte kopiera.', 'error'); }
});

// --- Reader with bionic reading + sentence grouping ---
function bionicWord(word) {
  const len = word.length;
  if (len <= 1) return `<b>${word}</b>`;
  const boldLen = Math.ceil(len / 2);
  return `<b>${word.slice(0, boldLen)}</b>${word.slice(boldLen)}`;
}

function splitSentences(text) {
  // Split on sentence-ending punctuation followed by space or end
  return text.match(/[^.!?]*[.!?]+[\s]?|[^.!?]+$/g) || [text];
}

function loadIntoReader() {
  const text = textOutput.value;
  if (!text.trim()) return;
  readerEl.innerHTML = '';
  sentenceSpans = [];
  const bionic = bionicToggle.checked;
  const normalized = normalizeText(text);
  const paragraphs = normalized.split(/\n\n+/);
  paragraphs.forEach((para, pi) => {
    const sentences = splitSentences(para.trim());
    sentences.forEach(sent => {
      const trimmed = sent.trim();
      if (!trimmed) return;
      const span = document.createElement('span');
      span.className = 'sentence';
      span.dataset.index = sentenceSpans.length;
      if (bionic) {
        span.innerHTML = trimmed.split(/\s+/).map(w => bionicWord(w)).join(' ');
      } else {
        span.textContent = trimmed;
      }
      readerEl.appendChild(span);
      readerEl.appendChild(document.createTextNode(' '));
      sentenceSpans.push({ el: span, text: trimmed });
    });
    if (pi < paragraphs.length - 1) {
      readerEl.appendChild(document.createElement('br'));
      readerEl.appendChild(document.createElement('br'));
    }
  });
}

bionicToggle.addEventListener('change', () => {
  readerEl.classList.toggle('bionic', bionicToggle.checked);
  if (sentenceSpans.length > 0) loadIntoReader();
});

// Click sentence to start reading from there
readerEl.addEventListener('click', (e) => {
  const span = e.target.closest('.sentence');
  if (!span) return;
  const idx = parseInt(span.dataset.index);
  if (isNaN(idx)) return;
  stopPlayback();
  startPlayback(idx);
});

// --- TTS: sentence-by-sentence ---
const TTS = (typeof window !== 'undefined' && window.speechSynthesis) ? window.speechSynthesis : null;

function populateVoices() {
  if (!TTS) return;
  const voices = TTS.getVoices();
  const cur = voiceSelect.value;
  voiceSelect.innerHTML = '';
  const sorted = [...voices].sort((a, b) => {
    const aSv = a.lang.startsWith('sv') ? 0 : 1;
    const bSv = b.lang.startsWith('sv') ? 0 : 1;
    return aSv !== bSv ? aSv - bSv : a.lang.localeCompare(b.lang);
  });
  sorted.forEach(v => {
    const o = document.createElement('option');
    o.value = v.name;
    o.textContent = `${v.name} (${v.lang})`;
    voiceSelect.appendChild(o);
  });
  if (cur && sorted.find(v => v.name === cur)) voiceSelect.value = cur;
  else { const sv = sorted.find(v => v.lang.startsWith('sv')); if (sv) voiceSelect.value = sv.name; }
}

if (TTS) {
  try { populateVoices(); } catch (e) {}
  if (TTS.onvoiceschanged !== undefined) TTS.onvoiceschanged = populateVoices;
} else {
  playBtn.disabled = true;
  const o = document.createElement('option'); o.textContent = 'Ingen röst tillgänglig';
  voiceSelect.appendChild(o); voiceSelect.disabled = true;
}

function getVoice() {
  return TTS ? TTS.getVoices().find(v => v.name === voiceSelect.value) || null : null;
}

function highlightSentence(idx) {
  clearHighlight();
  if (!highlightToggle.checked) return;
  if (idx < 0 || idx >= sentenceSpans.length) return;
  const el = sentenceSpans[idx].el;
  el.classList.add('active');
  const rect = el.getBoundingClientRect();
  const rRect = readerEl.getBoundingClientRect();
  if (rect.bottom > rRect.bottom || rect.top < rRect.top) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function speakSentence(idx) {
  if (ttsState.stopRequested || idx >= sentenceSpans.length) { finishPlayback(); return; }
  if (ttsState.paused) return;

  ttsState.sentenceIndex = idx;
  highlightSentence(idx);

  const utter = new SpeechSynthesisUtterance(sentenceSpans[idx].text);
  const voice = getVoice();
  if (voice) utter.voice = voice;
  utter.rate = parseFloat(rateSlider.value);
  utter.pitch = 1.0;
  utter.onend = () => speakSentence(idx + 1);
  utter.onerror = (e) => {
    if (e.error === 'canceled' || e.error === 'interrupted') return;
    speakSentence(idx + 1);
  };
  TTS.speak(utter);
}

function startPlayback(fromIndex) {
  if (!TTS || sentenceSpans.length === 0) return;
  ttsState = { speaking: true, paused: false, stopRequested: false, sentenceIndex: fromIndex || 0 };
  playBtn.disabled = true;
  pauseBtn.disabled = false;
  stopBtn.disabled = false;
  playBtn.textContent = '\u25b6 Spela';
  speakSentence(ttsState.sentenceIndex);
}

function finishPlayback() {
  clearHighlight();
  ttsState = { speaking: false, paused: false, stopRequested: false, sentenceIndex: 0 };
  playBtn.disabled = false; pauseBtn.disabled = true; stopBtn.disabled = true;
  playBtn.textContent = '\u25b6 Spela';
}

function stopPlayback() {
  if (!TTS) return;
  ttsState.stopRequested = true; ttsState.paused = false;
  TTS.cancel(); finishPlayback();
}

playBtn.addEventListener('click', () => {
  if (!TTS) { setStatus('Uppläsning stöds inte.', 'error'); return; }
  if (ttsState.paused) {
    ttsState.paused = false;
    playBtn.disabled = true; playBtn.textContent = '\u25b6 Spela'; pauseBtn.disabled = false;
    speakSentence(ttsState.sentenceIndex);
    return;
  }
  startPlayback(0);
});

pauseBtn.addEventListener('click', () => {
  if (!TTS) return;
  ttsState.paused = true;
  TTS.cancel();
  playBtn.disabled = false; playBtn.textContent = '\u25b6 Fortsätt'; pauseBtn.disabled = true;
});

stopBtn.addEventListener('click', stopPlayback);
function clearHighlight() { sentenceSpans.forEach(s => s.el.classList.remove('active')); }

// --- Settings ---
rateSlider.addEventListener('input', () => { rateValueEl.textContent = parseFloat(rateSlider.value).toFixed(1); });
fontSizeSlider.addEventListener('input', () => {
  document.documentElement.style.setProperty('--font-size', fontSizeSlider.value + 'px');
  fontSizeValue.textContent = fontSizeSlider.value;
});
lineHeightSlider.addEventListener('input', () => {
  document.documentElement.style.setProperty('--line-height', lineHeightSlider.value);
  lineHeightValue.textContent = parseFloat(lineHeightSlider.value).toFixed(1);
});
themeSelect.addEventListener('change', () => {
  if (themeSelect.value === 'light') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', themeSelect.value);
});
dyslexicFontToggle.addEventListener('change', () => {
  document.body.classList.toggle('dyslexic-font', dyslexicFontToggle.checked);
});

document.addEventListener('keydown', (e) => {
  const tag = document.activeElement.tagName;
  if (tag === 'TEXTAREA' || tag === 'INPUT' || tag === 'SELECT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    if (ttsState.speaking && !ttsState.paused) pauseBtn.click();
    else playBtn.click();
  } else if (e.code === 'Escape') stopBtn.click();
});

// --- PWA ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
}
let deferredInstallPrompt = null;
const installBtn = $('installBtn');
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault(); deferredInstallPrompt = e; installBtn.classList.remove('hidden');
});
installBtn.addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt(); await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null; installBtn.classList.add('hidden');
});
window.addEventListener('appinstalled', () => { installBtn.classList.add('hidden'); });
</script>
</body>
