<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OCR Läshjälp</title>
<meta name="description" content="Tolkar text från bilder och läser upp högt. Hjälp för elever med lässvårigheter.">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#fdf6e3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OCR Läshjälp">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
<style>
:root {
  --bg: #fdf6e3;
  --surface: #fffbf0;
  --ink: #1a1a1a;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --border: #d4cfc0;
  --muted: #6b6b6b;
  --success: #16a34a;
  --danger: #dc2626;
  --font-size: 20px;
  --line-height: 1.8;
  --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
[data-theme="dark"] { --bg:#1a1a1a; --surface:#262626; --ink:#f5f5f5; --border:#404040; --muted:#a0a0a0; }
[data-theme="highcontrast"] { --bg:#000; --surface:#0a0a0a; --ink:#fff; --accent:#ffff00; --accent-hover:#dddd00; --border:#fff; --muted:#ccc; }
* { box-sizing: border-box; }
body { font-family: var(--font-family); font-size: 16px; background: var(--bg); color: var(--ink); margin: 0; padding: 20px; min-height: 100vh; }
.container { max-width: 960px; margin: 0 auto; }
header { margin-bottom: 24px; }
h1 { font-size: 28px; margin: 0 0 4px; }
.subtitle { color: var(--muted); margin: 0; font-size: 14px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.card h2 { margin: 0 0 12px; font-size: 18px; }
.dropzone { border: 2px dashed var(--border); border-radius: 12px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface); display: block; }
.dropzone:hover, .dropzone.dragover { border-color: var(--accent); background: rgba(37, 99, 235, 0.05); }
.dropzone p { margin: 6px 0; color: var(--muted); }
.dropzone .primary-text { font-size: 18px; color: var(--ink); font-weight: 500; }
input[type="file"] { display: none; }
button { background: var(--accent); color: white; border: none; padding: 10px 16px; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; font-family: inherit; }
button:hover:not(:disabled) { background: var(--accent-hover); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
button.secondary { background: transparent; color: var(--ink); border: 1px solid var(--border); }
button.secondary:hover:not(:disabled) { background: rgba(0,0,0,0.05); }
.progress { background: var(--border); border-radius: 8px; height: 8px; overflow: hidden; margin: 12px 0; }
.progress-bar { background: var(--accent); height: 100%; transition: width 0.3s; width: 0%; }
.reader { font-size: var(--font-size); line-height: var(--line-height); font-family: var(--font-family); padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; min-height: 80px; user-select: text; max-height: 50vh; overflow-y: auto; white-space: normal; }
.reader .word { display: inline; padding: 2px 0; border-radius: 3px; transition: background 0.15s; }
.reader .word.active { background: #ffd700; color: #000; font-weight: 600; box-shadow: 0 0 0 2px #ffd700; }
#textOutput { font-size: var(--font-size); line-height: var(--line-height); font-family: var(--font-family); width: 100%; min-height: 200px; padding: 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--ink); resize: vertical; }
.controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 12px; }
.settings { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 12px; }
.setting { display: flex; flex-direction: column; gap: 4px; }
.setting label { font-size: 14px; color: var(--muted); }
.setting select, .setting input[type="range"] { padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--ink); font-family: inherit; font-size: 14px; }
.setting label:has(input[type="checkbox"]) { color: var(--ink); font-size: 16px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
.status { padding: 8px 12px; border-radius: 6px; font-size: 14px; margin: 8px 0; }
.status.info { background: rgba(37,99,235,0.1); color: var(--accent); }
.status.error { background: rgba(220,38,38,0.1); color: var(--danger); }
.status.success { background: rgba(22,163,74,0.1); color: var(--success); }
.hidden { display: none !important; }
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/gh/antijingoist/open-dyslexic@master/compiled/OpenDyslexic-Regular.woff2') format('woff2');
  font-weight: normal;
  font-display: swap;
}
.dyslexic-font { --font-family: 'OpenDyslexic', sans-serif; }
kbd { background: var(--border); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: monospace; }
.hint { color: var(--muted); font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
      <div>
        <h1>OCR Läshjälp</h1>
        <p class="subtitle">Ladda upp en bild — texten tolkas och läses upp högt.</p>
      </div>
      <button id="installBtn" class="secondary hidden" style="white-space:nowrap;">Installera app</button>
    </div>
  </header>

  <div class="card">
    <label for="fileInput" class="dropzone" id="dropzone">
      <p class="primary-text">Dra hit en bild eller klicka för att välja</p>
      <p>JPG, PNG, WEBP, BMP</p>
    </label>
    <input type="file" id="fileInput" accept="image/*">
    <canvas id="previewCanvas" class="hidden"></canvas>
    <img id="preview" class="hidden" alt="">

    <div class="settings">
      <div class="setting">
        <label for="langSelect">Språk</label>
        <select id="langSelect">
          <option value="swe">Svenska</option>
          <option value="eng">Engelska</option>
          <option value="swe+eng">Svenska + Engelska</option>
          <option value="nor">Norska</option>
          <option value="dan">Danska</option>
          <option value="deu">Tyska</option>
        </select>
      </div>
      <div class="setting">
        <label>
          <input type="checkbox" id="preprocessToggle" checked>
          Förbehandla bild
        </label>
      </div>
    </div>

    <div class="controls">
      <button id="ocrBtn" disabled>Tolka text</button>
      <button id="clearBtn" class="secondary" disabled>Rensa</button>
    </div>
    <div class="progress hidden" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="status"></div>
  </div>

  <div class="card hidden" id="resultCard">
    <div id="readerView">
      <div class="reader" id="reader"></div>
    </div>
    <div id="editView" class="hidden">
      <textarea id="textOutput"></textarea>
    </div>
    <div class="controls">
      <button id="playBtn">&#9654; Spela</button>
      <button id="pauseBtn" class="secondary" disabled>&#9646;&#9646; Paus</button>
      <button id="stopBtn" class="secondary" disabled>&#9632; Stopp</button>
      <span style="flex:1"></span>
      <button id="editToggleBtn" class="secondary">Redigera</button>
      <button id="copyBtn" class="secondary">Kopiera</button>
    </div>
    <div class="settings">
      <div class="setting">
        <label for="voiceSelect">Röst</label>
        <select id="voiceSelect"></select>
      </div>
      <div class="setting">
        <label for="rateSlider">Hastighet: <span id="rateValue">1.0</span>x</label>
        <input type="range" id="rateSlider" min="0.5" max="1.8" step="0.1" value="1.0">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="settings">
      <div class="setting">
        <label for="fontSizeSlider">Textstorlek: <span id="fontSizeValue">20</span>px</label>
        <input type="range" id="fontSizeSlider" min="14" max="40" step="1" value="20">
      </div>
      <div class="setting">
        <label for="lineHeightSlider">Radavstånd: <span id="lineHeightValue">1.8</span></label>
        <input type="range" id="lineHeightSlider" min="1.2" max="2.5" step="0.1" value="1.8">
      </div>
      <div class="setting">
        <label for="themeSelect">Tema</label>
        <select id="themeSelect">
          <option value="light">Ljust</option>
          <option value="dark">Mörkt</option>
          <option value="highcontrast">Hög kontrast</option>
        </select>
      </div>
      <div class="setting">
        <label>
          <input type="checkbox" id="dyslexicFontToggle">
          OpenDyslexic
        </label>
      </div>
    </div>
    <p class="hint"><kbd>Mellanslag</kbd> spela/paus &nbsp; <kbd>Esc</kbd> stopp</p>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const fileInput = $('fileInput'), dropzone = $('dropzone'), preview = $('preview');
const previewCanvas = $('previewCanvas');
const ocrBtn = $('ocrBtn'), clearBtn = $('clearBtn');
const langSelect = $('langSelect'), preprocessToggle = $('preprocessToggle');
const progressWrap = $('progressWrap'), progressBar = $('progressBar'), status = $('status');
const resultCard = $('resultCard'), textOutput = $('textOutput');
const readerView = $('readerView'), editView = $('editView');
const editToggleBtn = $('editToggleBtn'), copyBtn = $('copyBtn');
const reader = $('reader');
const playBtn = $('playBtn'), pauseBtn = $('pauseBtn'), stopBtn = $('stopBtn');
const voiceSelect = $('voiceSelect');
const rateSlider = $('rateSlider'), rateValue = $('rateValue');
const fontSizeSlider = $('fontSizeSlider'), fontSizeValue = $('fontSizeValue');
const lineHeightSlider = $('lineHeightSlider'), lineHeightValue = $('lineHeightValue');
const themeSelect = $('themeSelect'), dyslexicFontToggle = $('dyslexicFontToggle');

let currentImage = null;
let wordSpans = [];
let isPaused = false;
let isEditing = false;

function setStatus(msg, type = 'info') {
  status.innerHTML = msg ? `<div class="status ${type}">${msg}</div>` : '';
}

function normalizeText(text) {
  return text
    .replace(/-\s*\n\s*/g, '')
    .replace(/\n{2,}/g, '\n\n')
    .replace(/([^\n])\n([^\n])/g, '$1 $2')
    .replace(/ {2,}/g, ' ');
}

['dragenter', 'dragover'].forEach(ev => {
  dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('dragover'); });
});
['dragleave', 'drop'].forEach(ev => {
  dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove('dragover'); });
});
dropzone.addEventListener('drop', e => {
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) handleFile(file);
});

function handleFile(file) {
  if (!file.type.startsWith('image/')) {
    setStatus('Filen är inte en bild.', 'error');
    return;
  }
  currentImage = file;
  const fr = new FileReader();
  fr.onload = e => {
    preview.src = e.target.result;
    preview.onload = () => renderPreprocessed();
  };
  fr.readAsDataURL(file);
  ocrBtn.disabled = false;
  clearBtn.disabled = false;
  setStatus(`Bild laddad: ${file.name}`, 'success');
}

preprocessToggle.addEventListener('change', renderPreprocessed);

function renderPreprocessed() {
  if (!preview.src || !preview.complete || !preview.naturalWidth) return;
  const w = preview.naturalWidth, h = preview.naturalHeight;
  const targetWidth = Math.max(w, 1500);
  const scale = targetWidth / w;
  const sw = Math.round(w * scale);
  const sh = Math.round(h * scale);
  previewCanvas.width = sw;
  previewCanvas.height = sh;
  const ctx = previewCanvas.getContext('2d');
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(preview, 0, 0, sw, sh);

  if (preprocessToggle.checked) {
    const imgData = ctx.getImageData(0, 0, sw, sh);
    const d = imgData.data;
    let min = 255, max = 0;
    for (let i = 0; i < d.length; i += 4) {
      const g = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
      d[i] = d[i+1] = d[i+2] = g;
      if (g < min) min = g;
      if (g > max) max = g;
    }
    const range = Math.max(max - min, 1);
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.round(((d[i] - min) / range) * 255);
      d[i] = d[i+1] = d[i+2] = v;
    }
    ctx.putImageData(imgData, 0, 0);
  }
}

clearBtn.addEventListener('click', () => {
  currentImage = null;
  preview.src = '';
  ocrBtn.disabled = true;
  clearBtn.disabled = true;
  fileInput.value = '';
  resultCard.classList.add('hidden');
  setStatus('');
});

ocrBtn.addEventListener('click', async () => {
  if (!currentImage) return;
  ocrBtn.disabled = true;
  clearBtn.disabled = true;
  progressWrap.classList.remove('hidden');
  progressBar.style.width = '0%';
  setStatus('Startar OCR-motor...', 'info');

  const langs = langSelect.value.split('+');
  let worker;
  try {
    worker = await Tesseract.createWorker(langs, 1, {
      workerPath: 'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/worker.min.js',
      corePath: 'https://cdn.jsdelivr.net/npm/tesseract.js-core@5.1.1',
      langPath: 'https://tessdata.projectnaptha.com/4.0.0',
      logger: m => {
        if (m.status === 'recognizing text') {
          progressBar.style.width = (m.progress * 100) + '%';
          setStatus(`Tolkar text... ${Math.round(m.progress * 100)}%`, 'info');
        } else if (m.status && m.progress !== undefined) {
          setStatus(`${m.status}... ${Math.round(m.progress * 100)}%`, 'info');
        }
      },
      errorHandler: err => console.error('[OCR]', err)
    });

    await worker.setParameters({
      tessedit_pageseg_mode: '6',
      preserve_interword_spaces: '1'
    });

    const { data } = await worker.recognize(previewCanvas);
    const cleanText = data.text.trim();
    if (!cleanText) {
      setStatus('Ingen text hittades. Prova att slå av/på förbehandling eller kontrollera bilden.', 'error');
    } else {
      textOutput.value = cleanText;
      loadIntoReader();
      resultCard.classList.remove('hidden');
      setStatus('', 'success');
      resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  } catch (err) {
    setStatus(`Fel: ${err.message || err}`, 'error');
    console.error('[OCR]', err);
  } finally {
    if (worker) {
      try { await worker.terminate(); } catch (e) {}
    }
    progressWrap.classList.add('hidden');
    ocrBtn.disabled = false;
    clearBtn.disabled = false;
  }
});

editToggleBtn.addEventListener('click', () => {
  isEditing = !isEditing;
  if (isEditing) {
    readerView.classList.add('hidden');
    editView.classList.remove('hidden');
    editToggleBtn.textContent = 'Klar';
  } else {
    loadIntoReader();
    editView.classList.add('hidden');
    readerView.classList.remove('hidden');
    editToggleBtn.textContent = 'Redigera';
  }
});

copyBtn.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(textOutput.value);
    const orig = copyBtn.textContent;
    copyBtn.textContent = 'Kopierat!';
    setTimeout(() => copyBtn.textContent = orig, 1500);
  } catch (err) {
    setStatus('Kunde inte kopiera.', 'error');
  }
});

function loadIntoReader() {
  const text = textOutput.value;
  if (!text.trim()) return;
  reader.innerHTML = '';
  wordSpans = [];
  const normalized = normalizeText(text);
  const paragraphs = normalized.split(/\n\n+/);
  let charIndex = 0;
  paragraphs.forEach((para, pi) => {
    const tokens = para.trim().match(/\S+|\s+/g) || [];
    tokens.forEach(token => {
      if (/\S/.test(token)) {
        const span = document.createElement('span');
        span.className = 'word';
        span.textContent = token;
        span.dataset.start = charIndex;
        span.dataset.end = charIndex + token.length;
        reader.appendChild(span);
        wordSpans.push(span);
      } else {
        reader.appendChild(document.createTextNode(' '));
      }
      charIndex += token.length;
    });
    if (pi < paragraphs.length - 1) {
      charIndex += 2;
      reader.appendChild(document.createElement('br'));
      reader.appendChild(document.createElement('br'));
    }
  });
}

const TTS = (typeof window !== 'undefined' && window.speechSynthesis) ? window.speechSynthesis : null;

function populateVoices() {
  if (!TTS) return;
  const voices = TTS.getVoices();
  const currentSelected = voiceSelect.value;
  voiceSelect.innerHTML = '';
  const sorted = [...voices].sort((a, b) => {
    const aSv = a.lang.startsWith('sv') ? 0 : 1;
    const bSv = b.lang.startsWith('sv') ? 0 : 1;
    if (aSv !== bSv) return aSv - bSv;
    return a.lang.localeCompare(b.lang);
  });
  sorted.forEach(voice => {
    const opt = document.createElement('option');
    opt.value = voice.name;
    opt.textContent = `${voice.name} (${voice.lang})`;
    voiceSelect.appendChild(opt);
  });
  if (currentSelected && sorted.find(v => v.name === currentSelected)) {
    voiceSelect.value = currentSelected;
  } else {
    const svVoice = sorted.find(v => v.lang.startsWith('sv'));
    if (svVoice) voiceSelect.value = svVoice.name;
  }
}

if (TTS) {
  try { populateVoices(); } catch (e) {}
  if (TTS.onvoiceschanged !== undefined) TTS.onvoiceschanged = populateVoices;
} else {
  playBtn.disabled = true;
  const opt = document.createElement('option');
  opt.textContent = 'Ingen röst tillgänglig';
  voiceSelect.appendChild(opt);
  voiceSelect.disabled = true;
}

playBtn.addEventListener('click', () => {
  if (!TTS) { setStatus('Uppläsning stöds inte i denna webbläsare.', 'error'); return; }
  if (isPaused) {
    TTS.resume();
    isPaused = false;
    playBtn.disabled = true;
    playBtn.textContent = '\u25b6 Spela';
    pauseBtn.disabled = false;
    return;
  }
  const rawText = textOutput.value.trim();
  if (!rawText) return;
  TTS.cancel();
  clearHighlight();
  const ttsText = normalizeText(rawText);
  const utter = new SpeechSynthesisUtterance(ttsText);
  const selectedVoice = TTS.getVoices().find(v => v.name === voiceSelect.value);
  if (selectedVoice) utter.voice = selectedVoice;
  utter.rate = parseFloat(rateSlider.value);
  utter.pitch = 1.0;
  utter.onboundary = (e) => {
    if (e.name === 'word' || e.charIndex !== undefined) highlightAt(e.charIndex);
  };
  utter.onend = () => {
    clearHighlight();
    playBtn.disabled = false;
    pauseBtn.disabled = true;
    stopBtn.disabled = true;
    playBtn.textContent = '\u25b6 Spela';
    isPaused = false;
  };
  utter.onerror = (e) => {
    if (e.error !== 'canceled' && e.error !== 'interrupted') {
      setStatus(`Fel vid uppläsning: ${e.error}`, 'error');
    }
    clearHighlight();
    playBtn.disabled = false;
    pauseBtn.disabled = true;
    stopBtn.disabled = true;
    playBtn.textContent = '\u25b6 Spela';
  };
  TTS.speak(utter);
  playBtn.disabled = true;
  pauseBtn.disabled = false;
  stopBtn.disabled = false;
});

pauseBtn.addEventListener('click', () => {
  if (!TTS) return;
  TTS.pause();
  isPaused = true;
  playBtn.disabled = false;
  playBtn.textContent = '\u25b6 Fortsätt';
  pauseBtn.disabled = true;
});

stopBtn.addEventListener('click', () => {
  if (!TTS) return;
  TTS.cancel();
  clearHighlight();
  playBtn.disabled = false;
  pauseBtn.disabled = true;
  stopBtn.disabled = true;
  playBtn.textContent = '\u25b6 Spela';
  isPaused = false;
});

function highlightAt(charIndex) {
  clearHighlight();
  const word = wordSpans.find(s => {
    const start = parseInt(s.dataset.start);
    const end = parseInt(s.dataset.end);
    return charIndex >= start && charIndex < end;
  });
  if (word) {
    word.classList.add('active');
    const rect = word.getBoundingClientRect();
    const readerRect = reader.getBoundingClientRect();
    if (rect.bottom > readerRect.bottom || rect.top < readerRect.top) {
      word.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
}
function clearHighlight() { wordSpans.forEach(s => s.classList.remove('active')); }

rateSlider.addEventListener('input', () => { rateValue.textContent = parseFloat(rateSlider.value).toFixed(1); });
fontSizeSlider.addEventListener('input', () => {
  document.documentElement.style.setProperty('--font-size', fontSizeSlider.value + 'px');
  fontSizeValue.textContent = fontSizeSlider.value;
});
lineHeightSlider.addEventListener('input', () => {
  document.documentElement.style.setProperty('--line-height', lineHeightSlider.value);
  lineHeightValue.textContent = parseFloat(lineHeightSlider.value).toFixed(1);
});
themeSelect.addEventListener('change', () => {
  if (themeSelect.value === 'light') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', themeSelect.value);
});
dyslexicFontToggle.addEventListener('change', () => {
  document.body.classList.toggle('dyslexic-font', dyslexicFontToggle.checked);
});

document.addEventListener('keydown', (e) => {
  const tag = document.activeElement.tagName;
  if (tag === 'TEXTAREA' || tag === 'INPUT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    if (TTS && TTS.speaking && !isPaused) pauseBtn.click();
    else playBtn.click();
  } else if (e.code === 'Escape') {
    stopBtn.click();
  }
});

// ---- PWA ----
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

let deferredInstallPrompt = null;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  installBtn.classList.remove('hidden');
});

installBtn.addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  installBtn.classList.add('hidden');
});

window.addEventListener('appinstalled', () => {
  installBtn.classList.add('hidden');
});
</script>
</body>
</html>
